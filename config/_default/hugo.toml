# Hugo + Blowfish — https://blowfish.page/docs/getting-started/
# Local preview uses this baseURL; CI sets --baseURL to https://<owner>.github.io/ on deploy.
theme = "blowfish"
baseURL = "https://example.org/"
languageCode = "en"
defaultContentLanguage = "en"
title = "Ahmet Semi Asarkaya"

enableRobotsTXT = true
enableEmoji = true
summaryLength = 30

buildDrafts = false
buildFuture = false

[pagination]
pagerSize = 12

[imaging]
anchor = 'Center'

# Image cache location recommended for GitHub Actions builds
[caches]
  [caches.images]
    dir = ':cacheDir/images'

[taxonomies]
tag = "tags"
category = "categories"
author = "authors"
series = "series"

[sitemap]
changefreq = "monthly"
filename = "sitemap.xml"
priority = 0.5

[outputs]
home = ["HTML", "RSS", "JSON"]

[related]
threshold = 0
toLower = false

  [[related.indices]]
  name = "tags"
  weight = 100

  [[related.indices]]
  name = "categories"
  weight = 100
